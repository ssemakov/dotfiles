unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# vim-style pane navigation with prefix
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# copy mode (vi keys)
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi Escape send -X clear-selection

#improve colors
set -g default-terminal 'tmux-256color'
set -ga terminal-overrides ',xterm-256color:RGB'

# allow kitty graphics protocol passthrough (for nvim Snacks.image, etc.)
set -gq allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
#
## start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1
#
## renumber windows sequentially after closing any of them
set -g renumber-windows on
#
## increase scrollback lines
set -g history-limit 10000

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

## Satus bar design
# panes
set -g pane-border-style fg=black
set -g pane-active-border-style fg=brightred

# status line
set -g status-justify left
set -g status-bg default
set -g status-fg colour12
set -g status-interval 2
set-option -g focus-events on

# The panes {

set -g pane-border-style bg=colour235,fg=colour238
set -g pane-active-border-style bg=colour236,fg=colour51

# }

# The statusbar {

set -g status-position bottom
set -g status-style bg=colour236,fg=colour253
set -g status-left ''
set -g status-right '#[fg=colour253,bg=colour238,bold] Batt #{battery_percentage} (#{battery_remain}) #[fg=colour232,bg=colour109,bold] %d/%m #[fg=colour232,bg=colour114,bold] %H:%M:%S '
set -g status-right-length 300
set -g status-left-length 200

setw -g window-status-current-style fg=colour231,bg=colour24,bold
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour231]#W#[fg=colour51]#F '

setw -g window-status-style fg=colour250,bg=colour236
setw -g window-status-format ' #I#[fg=colour244]:#[fg=colour252]#W#[fg=colour244]#F '

setw -g window-status-bell-style fg=colour255,bg=colour1,bold

set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @yank_action 'copy-pipe-no-clear'
set -g @yank_selection_mouse 'clipboard'

#run-shell "powerline-daemon -q"
#source ~/.config/powerline.conf

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
